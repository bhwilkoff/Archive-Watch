<?xml version="1.0" encoding="UTF-8"?>
<!--
  Archive Watch — App Icon Master (1024 × 1024)

  Composite of:
    1. Bold flat orange background (#FF5C35)        — back layer
    2. Subtle vignette                               — depth
    3. Sprocketed black film frame                   — middle layer
    4. Méliès moon illustration inside the frame    — front layer

  Export to PNG at 1024×1024 for the App Store icon. For the layered
  tvOS app icon, split into separate PNGs per the tvOS HIG (back +
  middle + front), drop the vignette into the back layer, and the
  frame + moon into the front layer for parallax depth.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1024 1024"
     width="1024" height="1024">

  <defs>
    <!-- Background vignette: darkens corners ~6-8% -->
    <radialGradient id="bgVignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
      <stop offset="70%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
    </radialGradient>

    <!-- Sprocket hole gradient — slight inner-shadow feel -->
    <linearGradient id="sprocketShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#000000"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <!-- ============================================
       1. Background — bold accent color, full bleed
       ============================================ -->
  <rect x="0" y="0" width="1024" height="1024" fill="#FF5C35"/>

  <!-- 2. Vignette overlay -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bgVignette)"/>

  <!-- ============================================
       3. Film frame — sprocket strip + photo gutter

       Layout:
         Total composite: 720 × 620
         x = (1024 - 720) / 2 = 152
         y = (1024 - 620) / 2 = 202

         Top sprocket strip:    y = 202..242  (40px)
         Photo area:            y = 242..782  (540px)
         Bottom sprocket strip: y = 782..822  (40px)
       ============================================ -->
  <g>
    <!-- Top sprocket strip -->
    <rect x="152" y="202" width="720" height="40" fill="url(#sprocketShade)"/>
    <!-- Bottom sprocket strip -->
    <rect x="152" y="782" width="720" height="40" fill="url(#sprocketShade)"/>

    <!--
      Sprocket holes (perforations) — 10 across, evenly spaced.
      Each hole: 44px wide × 22px tall, vertically centered in
      its 40px strip (y = 211..233 for top, 791..813 for bottom).
    -->
    <g fill="#FF5C35">
      <!-- Top row of perforations -->
      <rect x="173"  y="211" width="44" height="22" rx="3"/>
      <rect x="241"  y="211" width="44" height="22" rx="3"/>
      <rect x="309"  y="211" width="44" height="22" rx="3"/>
      <rect x="377"  y="211" width="44" height="22" rx="3"/>
      <rect x="445"  y="211" width="44" height="22" rx="3"/>
      <rect x="513"  y="211" width="44" height="22" rx="3"/>
      <rect x="581"  y="211" width="44" height="22" rx="3"/>
      <rect x="649"  y="211" width="44" height="22" rx="3"/>
      <rect x="717"  y="211" width="44" height="22" rx="3"/>
      <rect x="785"  y="211" width="44" height="22" rx="3"/>

      <!-- Bottom row -->
      <rect x="173"  y="791" width="44" height="22" rx="3"/>
      <rect x="241"  y="791" width="44" height="22" rx="3"/>
      <rect x="309"  y="791" width="44" height="22" rx="3"/>
      <rect x="377"  y="791" width="44" height="22" rx="3"/>
      <rect x="445"  y="791" width="44" height="22" rx="3"/>
      <rect x="513"  y="791" width="44" height="22" rx="3"/>
      <rect x="581"  y="791" width="44" height="22" rx="3"/>
      <rect x="649"  y="791" width="44" height="22" rx="3"/>
      <rect x="717"  y="791" width="44" height="22" rx="3"/>
      <rect x="785"  y="791" width="44" height="22" rx="3"/>
    </g>

    <!--
      Inner stroke around each perforation — subtle white hairline
      to mimic the highlight on real film stock.
    -->
    <g fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="1">
      <rect x="173.5"  y="211.5" width="43" height="21" rx="2.5"/>
      <rect x="241.5"  y="211.5" width="43" height="21" rx="2.5"/>
      <rect x="309.5"  y="211.5" width="43" height="21" rx="2.5"/>
      <rect x="377.5"  y="211.5" width="43" height="21" rx="2.5"/>
      <rect x="445.5"  y="211.5" width="43" height="21" rx="2.5"/>
      <rect x="513.5"  y="211.5" width="43" height="21" rx="2.5"/>
      <rect x="581.5"  y="211.5" width="43" height="21" rx="2.5"/>
      <rect x="649.5"  y="211.5" width="43" height="21" rx="2.5"/>
      <rect x="717.5"  y="211.5" width="43" height="21" rx="2.5"/>
      <rect x="785.5"  y="211.5" width="43" height="21" rx="2.5"/>

      <rect x="173.5"  y="791.5" width="43" height="21" rx="2.5"/>
      <rect x="241.5"  y="791.5" width="43" height="21" rx="2.5"/>
      <rect x="309.5"  y="791.5" width="43" height="21" rx="2.5"/>
      <rect x="377.5"  y="791.5" width="43" height="21" rx="2.5"/>
      <rect x="445.5"  y="791.5" width="43" height="21" rx="2.5"/>
      <rect x="513.5"  y="791.5" width="43" height="21" rx="2.5"/>
      <rect x="581.5"  y="791.5" width="43" height="21" rx="2.5"/>
      <rect x="649.5"  y="791.5" width="43" height="21" rx="2.5"/>
      <rect x="717.5"  y="791.5" width="43" height="21" rx="2.5"/>
      <rect x="785.5"  y="791.5" width="43" height="21" rx="2.5"/>
    </g>

    <!--
      Photo area — deep charcoal background behind the moon, with a
      thin charcoal border separating it from the bold orange field.
    -->
    <rect x="152" y="242" width="720" height="540" fill="#0A0907"/>

    <!--
      The Méliès moon is positioned inside the photo area.
      Photo area starts at (152, 242). The moon SVG is 720×540 with
      its content centered around (360, 270), so we translate by
      (152, 242) to place it correctly.
    -->
    <g transform="translate(152 242)">

      <!-- Begin embedded moon — duplicated from melies-moon.svg
           so the icon master is a single self-contained file. If
           the moon is updated, regenerate this block from
           melies-moon.svg. -->

      <defs>
        <radialGradient id="iconMoonBody" cx="42%" cy="38%" r="65%">
          <stop offset="0%"  stop-color="#FFF6E1"/>
          <stop offset="55%" stop-color="#F2E5C2"/>
          <stop offset="100%" stop-color="#D6C49A"/>
        </radialGradient>
        <radialGradient id="iconCraterShade" cx="35%" cy="35%" r="70%">
          <stop offset="0%" stop-color="rgba(94,72,40,0)"/>
          <stop offset="100%" stop-color="rgba(94,72,40,0.55)"/>
        </radialGradient>
        <linearGradient id="iconRocketBody" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"  stop-color="#3F352E"/>
          <stop offset="50%" stop-color="#2A211B"/>
          <stop offset="100%" stop-color="#1A1410"/>
        </linearGradient>
        <filter id="iconMoonShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
          <feOffset dx="0" dy="8"/>
          <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
          <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Moon body -->
      <g filter="url(#iconMoonShadow)">
        <circle cx="360" cy="270" r="200" fill="url(#iconMoonBody)"/>
      </g>

      <!-- Craters -->
      <g opacity="0.85">
        <ellipse cx="270" cy="380" rx="36" ry="28" fill="url(#iconCraterShade)"/>
        <ellipse cx="270" cy="380" rx="32" ry="24" fill="none" stroke="rgba(94,72,40,0.25)" stroke-width="1.5"/>
        <ellipse cx="200" cy="290" rx="22" ry="18" fill="url(#iconCraterShade)"/>
        <ellipse cx="450" cy="395" rx="18" ry="14" fill="url(#iconCraterShade)"/>
        <circle cx="232" cy="370" r="6" fill="rgba(94,72,40,0.35)"/>
        <circle cx="305" cy="420" r="5" fill="rgba(94,72,40,0.32)"/>
        <circle cx="220" cy="240" r="4" fill="rgba(94,72,40,0.28)"/>
        <circle cx="500" cy="320" r="7" fill="rgba(94,72,40,0.32)"/>
        <circle cx="500" cy="200" r="5" fill="rgba(94,72,40,0.28)"/>
        <circle cx="395" cy="430" r="4" fill="rgba(94,72,40,0.28)"/>
        <path d="M 420 110 A 200 200 0 0 1 530 380 A 200 200 0 0 1 420 430 A 220 220 0 0 0 420 110 Z" fill="rgba(94,72,40,0.18)"/>
      </g>

      <!-- Face features -->
      <g fill="none" stroke="#241B14" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 280 200 Q 308 188 336 202" stroke-width="5"/>
        <path d="M 388 198 Q 416 184 444 200" stroke-width="5"/>
        <ellipse cx="308" cy="232" rx="14" ry="10" fill="#241B14" stroke="none"/>
        <circle cx="313" cy="228" r="2.5" fill="#F8EFD6"/>
        <path d="M 388 230 Q 410 216 432 234" stroke-width="5"/>
        <path d="M 380 245 Q 410 240 440 246" stroke-width="2.5" opacity="0.55"/>
        <path d="M 388 252 Q 410 250 432 252" stroke-width="2"   opacity="0.4"/>
        <path d="M 360 265 Q 354 290 366 308 Q 376 308 372 295" stroke-width="4"/>
        <path d="M 320 355 Q 360 345 400 355" stroke-width="5"/>
        <path d="M 332 365 Q 360 372 388 365" stroke-width="2.5" opacity="0.5"/>
        <path d="M 320 395 Q 360 405 400 395" stroke-width="2" opacity="0.35"/>
      </g>

      <!-- Rocket -->
      <g transform="translate(410 230) rotate(-22)">
        <ellipse cx="0" cy="0" rx="22" ry="14" fill="rgba(36,27,20,0.55)"/>
        <rect x="-6" y="-12" width="78" height="24" rx="6" ry="6" fill="url(#iconRocketBody)"/>
        <circle cx="14" cy="-6" r="1.4" fill="rgba(255,255,255,0.18)"/>
        <circle cx="34" cy="-6" r="1.4" fill="rgba(255,255,255,0.18)"/>
        <circle cx="54" cy="-6" r="1.4" fill="rgba(255,255,255,0.18)"/>
        <circle cx="14" cy="6"  r="1.4" fill="rgba(255,255,255,0.10)"/>
        <circle cx="34" cy="6"  r="1.4" fill="rgba(255,255,255,0.10)"/>
        <circle cx="54" cy="6"  r="1.4" fill="rgba(255,255,255,0.10)"/>
        <path d="M 72 -12 L 90 -18 L 90 18 L 72 12 Z" fill="url(#iconRocketBody)"/>
        <path d="M 60 -12 L 70 -22 L 78 -16 L 70 -12 Z" fill="#1A1410"/>
        <path d="M 60  12 L 70  22 L 78  16 L 70  12 Z" fill="#1A1410"/>
        <path d="M -2 -10 Q 35 -12 70 -10" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2" stroke-linecap="round"/>
      </g>
      <!-- End embedded moon -->

    </g>

    <!--
      Subtle inner highlight on the photo area (a faint top-edge glow,
      mimicking light bouncing off film emulsion).
    -->
    <rect x="152" y="242" width="720" height="540"
          fill="none" stroke="#1A1410" stroke-width="2"/>
  </g>

</svg>
