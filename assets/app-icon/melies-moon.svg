<?xml version="1.0" encoding="UTF-8"?>
<!--
  Méliès Moon — vector illustration for Archive Watch app icon.

  A stylized recreation of the iconic image from Georges Méliès'
  "Le Voyage dans la Lune" (1902): an anthropomorphic moon face with
  a rocket lodged in its right eye.

  Designed to read clearly at 64px and beautifully at 1024px. Sits
  inside a 720×540 academy-ratio frame; this file is the moon alone,
  on a transparent background, sized for that frame's interior.

  Hand-illustrated, public domain. Production version may be swapped
  with a high-resolution photographic still from the same film
  (also public domain, available via the National Film Registry and
  Wikimedia Commons).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 720 540"
     width="720" height="540"
     role="img"
     aria-label="The Méliès moon — a cratered moon face with a rocket in its right eye">

  <defs>
    <!-- Subtle radial shading for the moon body -->
    <radialGradient id="moonBody" cx="42%" cy="38%" r="65%">
      <stop offset="0%"  stop-color="#FFF6E1"/>
      <stop offset="55%" stop-color="#F2E5C2"/>
      <stop offset="100%" stop-color="#D6C49A"/>
    </radialGradient>

    <!-- Crater shadow gradient -->
    <radialGradient id="craterShade" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="rgba(94,72,40,0)"/>
      <stop offset="100%" stop-color="rgba(94,72,40,0.55)"/>
    </radialGradient>

    <!-- Rocket body shading -->
    <linearGradient id="rocketBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#3F352E"/>
      <stop offset="50%" stop-color="#2A211B"/>
      <stop offset="100%" stop-color="#1A1410"/>
    </linearGradient>

    <!-- Rocket nose tip highlight -->
    <linearGradient id="rocketTip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#5C4B3D"/>
      <stop offset="100%" stop-color="#2A211B"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="moonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Moon body
    Center (360, 270), radius 200.
  -->
  <g filter="url(#moonShadow)">
    <circle cx="360" cy="270" r="200" fill="url(#moonBody)"/>
  </g>

  <!--
    Craters — concentrated along the lower-left and edges, leaving
    the face area (upper-mid-right) clear for features.
  -->
  <g opacity="0.85">
    <!-- Large crater, lower-left -->
    <ellipse cx="270" cy="380" rx="36" ry="28" fill="url(#craterShade)"/>
    <ellipse cx="270" cy="380" rx="32" ry="24" fill="none" stroke="rgba(94,72,40,0.25)" stroke-width="1.5"/>

    <!-- Medium crater, mid-left edge -->
    <ellipse cx="200" cy="290" rx="22" ry="18" fill="url(#craterShade)"/>

    <!-- Small crater, lower-right -->
    <ellipse cx="450" cy="395" rx="18" ry="14" fill="url(#craterShade)"/>

    <!-- Tiny craters for surface texture -->
    <circle cx="232" cy="370" r="6" fill="rgba(94,72,40,0.35)"/>
    <circle cx="305" cy="420" r="5" fill="rgba(94,72,40,0.32)"/>
    <circle cx="220" cy="240" r="4" fill="rgba(94,72,40,0.28)"/>
    <circle cx="500" cy="320" r="7" fill="rgba(94,72,40,0.32)"/>
    <circle cx="500" cy="200" r="5" fill="rgba(94,72,40,0.28)"/>
    <circle cx="395" cy="430" r="4" fill="rgba(94,72,40,0.28)"/>

    <!-- A subtle terminator (limb shading) on the right -->
    <path d="M 420 110
             A 200 200 0 0 1 530 380
             A 200 200 0 0 1 420 430
             A 220 220 0 0 0 420 110 Z"
          fill="rgba(94,72,40,0.18)"/>
  </g>

  <!--
    Face features — minimal lines, expressive.
    The face occupies the upper-center of the moon disc.
    Eyes at y ~230, eyebrow arches above, nose mid-face, mouth at y ~340.
  -->
  <g fill="none" stroke="#241B14" stroke-linecap="round" stroke-linejoin="round">

    <!-- Left eyebrow — gentle arch -->
    <path d="M 280 200 Q 308 188 336 202" stroke-width="5"/>

    <!-- Right eyebrow — broken / surprised, raised + furrowed -->
    <path d="M 388 198 Q 416 184 444 200" stroke-width="5"/>

    <!-- Left eye — open, intact -->
    <ellipse cx="308" cy="232" rx="14" ry="10" fill="#241B14" stroke="none"/>
    <!-- highlight to keep the eye lively -->
    <circle cx="313" cy="228" r="2.5" fill="#F8EFD6"/>

    <!--
      Right eye — wounded by the rocket. We draw it as a closed
      asymmetric slit (the rocket has plowed in). The rocket itself
      is rendered separately on top.
    -->
    <path d="M 388 230 Q 410 216 432 234" stroke-width="5"/>
    <!-- a hint of crater radiating from the impact -->
    <path d="M 380 245 Q 410 240 440 246" stroke-width="2.5" opacity="0.55"/>
    <path d="M 388 252 Q 410 250 432 252" stroke-width="2"   opacity="0.4"/>

    <!-- Nose — small bump line -->
    <path d="M 360 265 Q 354 290 366 308 Q 376 308 372 295" stroke-width="4"/>

    <!-- Mouth — pursed, slightly downturned (the moon is not pleased) -->
    <path d="M 320 355 Q 360 345 400 355" stroke-width="5"/>
    <!-- mustache-ish shadow under the lower lip -->
    <path d="M 332 365 Q 360 372 388 365" stroke-width="2.5" opacity="0.5"/>

    <!-- Subtle chin shading -->
    <path d="M 320 395 Q 360 405 400 395" stroke-width="2" opacity="0.35"/>
  </g>

  <!--
    The Rocket — a short, stout projectile lodged in the right eye,
    angled up-and-to-the-right. Nose hidden (embedded in the eye),
    body and fin/exhaust visible.
  -->
  <g transform="translate(410 230) rotate(-22)">

    <!-- Wound shadow around the impact point -->
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="rgba(36,27,20,0.55)"/>

    <!-- Rocket body — capsule shape protruding from eye -->
    <rect x="-6" y="-12" width="78" height="24" rx="6" ry="6" fill="url(#rocketBody)"/>

    <!-- Cap rivet detail along the body -->
    <circle cx="14" cy="-6" r="1.4" fill="rgba(255,255,255,0.18)"/>
    <circle cx="34" cy="-6" r="1.4" fill="rgba(255,255,255,0.18)"/>
    <circle cx="54" cy="-6" r="1.4" fill="rgba(255,255,255,0.18)"/>
    <circle cx="14" cy="6"  r="1.4" fill="rgba(255,255,255,0.10)"/>
    <circle cx="34" cy="6"  r="1.4" fill="rgba(255,255,255,0.10)"/>
    <circle cx="54" cy="6"  r="1.4" fill="rgba(255,255,255,0.10)"/>

    <!-- Tail end (where exhaust would emerge) — flared -->
    <path d="M 72 -12 L 90 -18 L 90 18 L 72 12 Z" fill="url(#rocketBody)"/>

    <!-- Two fins for silhouette legibility at small sizes -->
    <path d="M 60 -12 L 70 -22 L 78 -16 L 70 -12 Z" fill="#1A1410"/>
    <path d="M 60  12 L 70  22 L 78  16 L 70  12 Z" fill="#1A1410"/>

    <!-- Specular highlight along the top of the body -->
    <path d="M -2 -10 Q 35 -12 70 -10" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2" stroke-linecap="round"/>
  </g>

</svg>
