name: Discover + ingest PD content

# Daily pipeline that grows the catalog. Three stages
# (see docs/research/omdb-and-pd-discovery.md):
#   1. discover — Wikidata SPARQL for PD films (Internet Archive ID + IMDb
#      ID) not yet in our catalogs → refreshes the candidate queue.
#      Read-only; never touches the catalogs.
#   2. ingest  — drain a daily-capped batch: validate each candidate
#      against live Archive metadata, pick a playable derivative, classify,
#      enrich via OMDb, append to both catalogs.
#   3. episode-wants — resolve each series to its canonical episode list
#      (via OMDb) and queue the specific episodes we're missing.
#   4. tv-backfill — prune junk-clustered series, then grow under-populated
#      TV shows by searching Archive for more episodes (prioritising series
#      with known gaps from the wants queue, and marking wants fulfilled).
# All purely additive; commits directly to main.

on:
  schedule:
    # 03:42 UTC — after the OMDb backfill (02:17) so newly-ingested items
    # with IMDb IDs can be rich-enriched the same night, and at an odd
    # minute to dodge the cron-wave.
    - cron: '42 3 * * *'
  workflow_dispatch:
    inputs:
      discover_limit:
        description: 'Max rows per Wikidata SPARQL feed'
        required: false
        default: '8000'
      max_items:
        description: 'Max candidates to ingest this run'
        required: false
        default: '60'
      include_low_confidence:
        description: 'Also ingest low rights-confidence candidates'
        required: false
        default: 'false'
      tv_max_series:
        description: 'Max TV series to backfill episodes for this run'
        required: false
        default: '40'
      wants_max_series:
        description: 'Max TV series to resolve canonical episode lists for'
        required: false
        default: '40'

concurrency:
  # Shared group with omdb-backfill — both push to main, so they must
  # serialize (a concurrent run rejected a push the first time). Also
  # prevents two discover runs racing the candidate queue.
  group: catalog-writers
  cancel-in-progress: false

jobs:
  discover-ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Discover candidates (Wikidata, read-only)
        run: |
          python tools/discover_wikidata_pd.py \
            --limit ${{ github.event.inputs.discover_limit || '8000' }} \
            | tee discover.log

      - name: Ingest a daily batch
        env:
          OMDB_KEY: ${{ secrets.OMDB_KEY }}
        run: |
          python tools/ingest_candidates.py \
            --max-items ${{ github.event.inputs.max_items || '60' }} \
            ${{ github.event.inputs.include_low_confidence == 'true' && '--include-low-confidence' || '' }} \
            | tee ingest.log

      - name: Build episode-wants queue (canonical lists from OMDb)
        env:
          OMDB_KEY: ${{ secrets.OMDB_KEY }}
        run: |
          # Resolve each series to its IMDb ID, pull the canonical episode
          # list, and queue the episodes we're missing. Series are cached
          # after first resolve, so this drains the unresolved ones daily.
          python tools/build_episode_wants.py \
            --max-series ${{ github.event.inputs.wants_max_series || '40' }} \
            | tee wants.log

      - name: Backfill TV episodes (prune junk + grow under-populated series)
        run: |
          # Prunes junk series, prioritises series with known gaps (from the
          # wants queue), grows under-populated series, and marks fulfilled
          # wants. Targets <=8-episode series first for the biggest wins.
          python tools/backfill_tv_episodes.py \
            --prune \
            --min-episodes 8 \
            --max-series ${{ github.event.inputs.tv_max_series || '40' }} \
            | tee tv.log

      - name: Summary
        run: |
          echo "## Discover + ingest + TV backfill" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -6 discover.log >> $GITHUB_STEP_SUMMARY
          echo '--- ingest ---' >> $GITHUB_STEP_SUMMARY
          tail -8 ingest.log >> $GITHUB_STEP_SUMMARY
          echo '--- episode wants ---' >> $GITHUB_STEP_SUMMARY
          tail -4 wants.log >> $GITHUB_STEP_SUMMARY
          echo '--- tv backfill ---' >> $GITHUB_STEP_SUMMARY
          tail -10 tv.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add shared/editorial/discovery_candidates.json \
                  shared/editorial/omdb_cache.json \
                  shared/editorial/episode_wants.json \
                  catalog.json \
                  ArchiveWatch/ArchiveWatch/catalog.json \
                  series/

          if git diff --cached --quiet; then
            echo "No changes — nothing discovered, ingested, or backfilled."
            exit 0
          fi

          git commit -m "Discover + ingest + TV backfill (${{ github.run_id }})"

          # Push with rebase-retry (see omdb-backfill.yml for rationale).
          # The shared catalog-writers concurrency group serializes us with
          # the OMDb job; a rejected push means main merely advanced, so a
          # plain rebase replays our commit. Fail loudly on a real conflict.
          for attempt in 1 2 3 4 5; do
            if git push; then echo "pushed (attempt $attempt)"; exit 0; fi
            echo "push rejected; rebasing onto latest main (attempt $attempt)…"
            git pull --rebase origin main || { git rebase --abort; exit 1; }
            sleep $((RANDOM % 5 + 2))
          done
          echo "::error::could not push after retries"; exit 1
