name: Discover + ingest PD content

# Daily pipeline that grows the catalog from multiple public-domain
# sources (see docs/research/omdb-and-pd-discovery.md):
#   1. discover (Wikidata) — PD films by copyright flag / Archive id.
#   2. discover (Archive collections) — mine feature_films / silent_films /
#      classic_tv / prelinger / animation / film_noir; every hit is already
#      a playable Archive item.
#   3. ingest — drain the candidate queue: resolve IA-id-less candidates to
#      a playable item by title+year, validate, classify, enrich via OMDb.
#   4. Library of Congress — ingest US-gov PD films (downloadable MP4),
#      generally not on the Internet Archive.
#   5. episode-wants — resolve each series to its canonical episode list
#      (OMDb) and queue the specific episodes we're missing.
#   6. tv-backfill — prune junk series, then grow under-populated shows via
#      per-want + broad Archive search; mark wants fulfilled.
# All purely additive; commits directly to main.

on:
  schedule:
    # 03:42 UTC — after the OMDb backfill (02:17) so newly-ingested items
    # with IMDb IDs can be rich-enriched the same night, and at an odd
    # minute to dodge the cron-wave.
    - cron: '42 3 * * *'
  workflow_dispatch:
    inputs:
      discover_limit:
        description: 'Max rows per Wikidata SPARQL feed'
        required: false
        default: '8000'
      max_items:
        description: 'Max candidates to ingest this run'
        required: false
        default: '60'
      include_low_confidence:
        description: 'Also ingest low rights-confidence candidates'
        required: false
        default: 'false'
      tv_max_series:
        description: 'Max TV series to backfill episodes for this run'
        required: false
        default: '40'
      wants_max_series:
        description: 'Max TV series to resolve canonical episode lists for'
        required: false
        default: '40'
      arch_per_collection:
        description: 'Max items to mine per Internet Archive collection'
        required: false
        default: '600'
      resolve_limit:
        description: 'Max IA-id-less candidates to resolve by title+year'
        required: false
        default: '120'
      loc_max_items:
        description: 'Max new Library of Congress films to ingest'
        required: false
        default: '30'
      run_loc:
        description: 'Run the LoC feed (only works off a residential IP — loc.gov 403s CI)'
        required: false
        default: 'false'

concurrency:
  # Shared group with omdb-backfill — both push to main, so they must
  # serialize (a concurrent run rejected a push the first time). Also
  # prevents two discover runs racing the candidate queue.
  group: catalog-writers
  cancel-in-progress: false

jobs:
  discover-ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Discover candidates (Wikidata, read-only)
        run: |
          python tools/discover_wikidata_pd.py \
            --limit ${{ github.event.inputs.discover_limit || '8000' }} \
            | tee discover.log

      - name: Discover candidates (Internet Archive PD collections)
        run: |
          # Mines feature_films / silent_films / classic_tv / prelinger /
          # animation / film_noir etc. — every candidate is already a
          # playable Archive item. Complements Wikidata (which flags rights
          # but often lacks a playable id).
          python tools/discover_archive_collections.py \
            --per-collection ${{ github.event.inputs.arch_per_collection || '600' }} \
            | tee arch_discover.log

      - name: Ingest a daily batch (with title resolver)
        env:
          OMDB_KEY: ${{ secrets.OMDB_KEY }}
        run: |
          # Resolves PD-flagged candidates that lack an Archive id to a
          # playable item by title+year (--resolve-limit), then ingests.
          python tools/ingest_candidates.py \
            --max-items ${{ github.event.inputs.max_items || '60' }} \
            --resolve-limit ${{ github.event.inputs.resolve_limit || '120' }} \
            ${{ github.event.inputs.include_low_confidence == 'true' && '--include-low-confidence' || '' }} \
            | tee ingest.log

      - name: Discover + ingest Library of Congress films
        # loc.gov blocks datacenter IPs (incl. GitHub runners) with a 403,
        # so this only does real work on a residential IP / self-hosted
        # runner. Manual-dispatch-only to avoid a daily no-op; the script
        # also skips cleanly on 403 if it ever does run here.
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_loc == 'true'
        run: |
          python tools/discover_loc.py \
            --max-items ${{ github.event.inputs.loc_max_items || '30' }} \
            | tee loc.log || true

      - name: Build episode-wants queue (canonical lists from OMDb)
        env:
          OMDB_KEY: ${{ secrets.OMDB_KEY }}
        run: |
          # Resolve each series to its IMDb ID, pull the canonical episode
          # list, and queue the episodes we're missing. Series are cached
          # after first resolve, so this drains the unresolved ones daily.
          python tools/build_episode_wants.py \
            --max-series ${{ github.event.inputs.wants_max_series || '40' }} \
            | tee wants.log

      - name: Backfill TV episodes (prune junk + grow under-populated series)
        run: |
          # Prunes junk series, prioritises series with known gaps (from the
          # wants queue), grows under-populated series, and marks fulfilled
          # wants. Targets <=8-episode series first for the biggest wins.
          python tools/backfill_tv_episodes.py \
            --prune \
            --min-episodes 8 \
            --max-series ${{ github.event.inputs.tv_max_series || '40' }} \
            | tee tv.log

      - name: Summary
        run: |
          echo "## Daily content pipeline" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '--- wikidata discover ---'   >> $GITHUB_STEP_SUMMARY; tail -4 discover.log >> $GITHUB_STEP_SUMMARY
          echo '--- archive collections ---' >> $GITHUB_STEP_SUMMARY; tail -4 arch_discover.log >> $GITHUB_STEP_SUMMARY
          echo '--- ingest (+resolver) ---'  >> $GITHUB_STEP_SUMMARY; tail -8 ingest.log >> $GITHUB_STEP_SUMMARY
          [ -f loc.log ] && { echo '--- library of congress ---' >> $GITHUB_STEP_SUMMARY; tail -3 loc.log >> $GITHUB_STEP_SUMMARY; }
          echo '--- episode wants ---'        >> $GITHUB_STEP_SUMMARY; tail -3 wants.log >> $GITHUB_STEP_SUMMARY
          echo '--- tv backfill ---'          >> $GITHUB_STEP_SUMMARY; tail -8 tv.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add shared/editorial/discovery_candidates.json \
                  shared/editorial/omdb_cache.json \
                  shared/editorial/episode_wants.json \
                  catalog.json \
                  ArchiveWatch/ArchiveWatch/catalog.json \
                  series/

          if git diff --cached --quiet; then
            echo "No changes — nothing discovered, ingested, or backfilled."
            exit 0
          fi

          git commit -m "Discover + ingest + TV backfill (${{ github.run_id }})"

          # Push with rebase-retry (see omdb-backfill.yml for rationale).
          # The shared catalog-writers concurrency group serializes us with
          # the OMDb job; a rejected push means main merely advanced, so a
          # plain rebase replays our commit. Fail loudly on a real conflict.
          for attempt in 1 2 3 4 5; do
            if git push; then echo "pushed (attempt $attempt)"; exit 0; fi
            echo "push rejected; rebasing onto latest main (attempt $attempt)…"
            git pull --rebase origin main || { git rebase --abort; exit 1; }
            sleep $((RANDOM % 5 + 2))
          done
          echo "::error::could not push after retries"; exit 1
