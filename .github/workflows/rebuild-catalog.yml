name: Rebuild catalog

on:
  schedule:
    # Mondays 05:00 UTC
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      seed_limit:
        description: 'Wikidata seed cap'
        required: false
        default: '800'
      per_shelf:
        description: 'Items per shelf'
        required: false
        default: '48'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build catalog
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
        run: |
          node tools/build-catalog.mjs \
            --seed-from-wikidata \
            --seed-limit=${{ inputs.seed_limit || '800' }} \
            --per-shelf=${{ inputs.per_shelf || '48' }} \
            --concurrency=3

      - name: Stats summary
        run: |
          echo "## Catalog stats" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          jq '.stats' catalog.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Weekly catalog refresh"
          title: "Catalog refresh — ${{ github.run_id }}"
          branch: catalog-refresh/${{ github.run_id }}
          add-paths: catalog.json
          body: |
            Auto-generated by `.github/workflows/rebuild-catalog.yml`.

            Review the stats in the run summary before merging. If the
            `totalItems` or `fullyEnriched` number dropped significantly,
            investigate — Archive.org may have changed an API or a
            collection ID.

            Merge will ship the updated catalog to all app instances
            on next launch (via CatalogRefreshService).
